services:
    
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    ports:
      - 8090:8080  
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      WATCHTOWER_DISABLE_CONTAINERS: /amnezia-awg
      WATCHTOWER_NOTIFICATION_URL: telegram://${TELEGRAM_BOT_TOKEN}@telegram?chats=${CHAT_ID}
      # DOCKER_API_VERSION: 1.49
      # WATCHTOWER_RUN_ONCE: true
    restart: unless-stopped
  
  telemt:
    image: ghcr.io/telemt/telemt:latest
    build: .
    container_name: telemt
    restart: unless-stopped
    # Allow caching 'proxy-secret' in read-only container
    working_dir: /run/telemt
    volumes:
      - ./telemt:/run/telemt
    environment:
      - RUST_LOG=info
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # allow binding to port 443
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  telemt-panel:
    image: ghcr.io/amirotin/telemt_panel:latest
    container_name: telemt-panel
    volumes:
      - ./telemt-panel:/etc/telemt-panel
      - ./telemt:/run/telemt:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    network_mode: host
