services:
    
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    ports:
      - 8090:8080  
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      WATCHTOWER_DISABLE_CONTAINERS: /amnezia-awg
      WATCHTOWER_NOTIFICATION_URL: telegram://${TELEGRAM_BOT_TOKEN}@telegram?chats=${CHAT_ID}
      # DOCKER_API_VERSION: 1.49
      # WATCHTOWER_RUN_ONCE: true
    restart: unless-stopped

  telemt:
    image: ghcr.io/telemt/telemt:latest
    build: .
    container_name: telemt
    ports:
      - 4455:4455 # proxy
      - 9091:9091 # api
      - 9090:9090 # metrics 
    # Allow caching 'proxy-secret' in read-only container
    working_dir: /run/telemt
    volumes:
      - ./telemt:/run/telemt
    environment:
      - RUST_LOG=info
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # allow binding to port
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    
  telemt-panel:
    image: ghcr.io/amirotin/telemt_panel:latest
    container_name: telemt-panel
    network_mode: host
    volumes:
      - ./telemt-panel:/etc/telemt-panel
      - ./telemt:/run/telemt:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - 9100:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    
  prometheus-amnezia-exporter:
    image: fixfever/prometheus-amnezia-exporter:latest
    container_name: prometheus-amnezia-exporter
    ports:
      - 9586:9586
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped  